name: smart_album
description: 随搜相册 - 支持AI图片语义搜索的本地相册应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.8.0
  permission_handler: ^11.0.0
  http: ^1.1.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  flutter_local_notifications: ^18.0.0
  flutter_image_compress: ^2.3.0
  share_plus: ^10.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
